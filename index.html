<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NORTRADE | Maintenance</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      background-color: #111111;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      font-weight: 300;
      color: #999999;
      max-width: 500px;
      line-height: 1.6;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 4px;
      margin-bottom: 3rem;
    }

    .contact {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #777777;
    }

    .contact a {
      color: #ffffff;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .contact a:hover {
      color: #cccccc;
    }
  </style>
</head>
<body>
  <div class="logo">NORTRADE</div>
  
  <h1>Under Maintenance</h1>
  <p>We are currently updating our website to bring you a better experience. We will be back online shortly.</p>
  
  <div class="contact">
    For urgent inquiries, please contact <br><br>
    <a href="mailto:contact@nortrade.ch">contact@nortrade.ch</a> | <a href="tel:+41782065942">+41 78 206 59 42</a>
  </div>

</html>
