<!DOCTYPE html>
<html lang="fr" data-lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A1A1A">
  <title>404 — Page Introuvable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    .not-found-section {
      padding: 0;
      background: var(--color-bg-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: var(--color-white);
    }
    
    .not-found-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.3;
    }
    .not-found-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
    }

    .not-found-bg::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(13,13,11,0.2) 0%, rgba(13,13,11,1) 100%);
    }

    .not-found-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 800px;
      padding: 2rem;
    }

    .not-found-code {
      font-family: 'Cinzel', serif;
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 300;
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
      color: var(--color-gold);
    }

    .not-found-title {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 1.5rem;
      font-weight: 400;
      font-style: italic;
    }

    .not-found-desc {
      font-family: var(--font-sans);
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 3rem;
      line-height: 1.6;
    }

    .not-found-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 3rem;
      background: transparent;
      color: var(--color-white);
      border: 1px solid rgba(255,255,255,0.2);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-decoration: none;
      border-radius: 2px;
      transition: all 0.4s ease;
      backdrop-filter: blur(5px);
      cursor: pointer;
    }

    .not-found-btn:hover {
      background: var(--color-white);
      color: var(--color-black);
    }
  </style>
</head>
<body class="is-loading">
  <!-- LOADING SCREEN -->
  <div class="loading-screen" id="loading-screen">
    <div class="loader-content">
      <div class="loader-logo">N</div>
      <div class="loader-progress">
        <div class="loader-bar" id="loader-bar"></div>
      </div>
    </div>
  </div>

  <div id="header-placeholder"></div>

  <main>
    <section class="not-found-section">
      <div class="not-found-bg">
        <img src="assets/images/IMG_20260715_112157_603.webp" alt="Background">
      </div>
      
      <div class="not-found-content">
        <div class="not-found-code reveal-up">404</div>
        <h1 class="not-found-title reveal-up" data-fr="Page Introuvable" data-en="Page Not Found">Page Introuvable</h1>
        <p class="not-found-desc reveal-up" data-fr="L'espace que vous recherchez n'existe pas ou a été déplacé. Retournez à l'accueil pour découvrir nos projets." data-en="The space you are looking for does not exist or has been moved. Return to the homepage to discover our projects.">L'espace que vous recherchez n'existe pas ou a été déplacé. Retournez à l'accueil pour découvrir nos projets.</p>
        
        <div class="reveal-up" style="transition-delay: 0.2s;">
          <a href="index.html" class="not-found-btn" data-fr="RETOUR À L'ACCUEIL" data-en="BACK TO HOME">RETOUR À L'ACCUEIL</a>
        </div>
      </div>
    </section>
  </main>

  <!-- RIGHT EDGE BUTTONS (Chatbot & WhatsApp) -->
  <div class="right-edge-buttons">
    <button class="edge-btn chatbot-trigger" id="chatbot-trigger" aria-label="Ouvrir le chat">
      <span class="edge-text" data-fr="ASSISTANT" data-en="ASSISTANT">ASSISTANT</span>
      <div class="edge-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      </div>
    </button>
    <a href="https://wa.me/41782065942" target="_blank" rel="noopener" class="edge-btn whatsapp-trigger" aria-label="Contact sur WhatsApp">
      <span class="edge-text">WHATSAPP</span>
      <div class="edge-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
      </div>
    </a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
